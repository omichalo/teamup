name: Deploy Firestore Rules and Indexes

on:
  push:
    branches:
      - staging
      - main
      - master
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - ".github/workflows/deploy-firestore.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environnement cible"
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-firestore-staging:
    name: Deploy Firestore to staging (sqyping-teamup-dev)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/staging') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate with Firebase Service Account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "❌ Erreur: Le secret FIREBASE_SERVICE_ACCOUNT n'est pas défini"
            exit 1
          fi
          SERVICE_ACCOUNT_FILE="${{ github.workspace }}/firebase-service-account.json"
          printf '%s\n' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$SERVICE_ACCOUNT_FILE"
          if ! python3 -m json.tool "$SERVICE_ACCOUNT_FILE" > /dev/null 2>&1; then
            echo "❌ Erreur: Le fichier JSON du service account est invalide"
            exit 1
          fi
          gcloud auth activate-service-account --key-file="$SERVICE_ACCOUNT_FILE"
          echo "SERVICE_ACCOUNT_FILE=$SERVICE_ACCOUNT_FILE" >> $GITHUB_ENV

      - name: Deploy Firestore Rules and Indexes (staging)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.SERVICE_ACCOUNT_FILE }}
        run: |
          firebase deploy --only firestore:rules,firestore:indexes \
            --project sqyping-teamup-dev \
            --non-interactive

      - name: Verify deployment
        run: echo "✅ Firestore déployé sur sqyping-teamup-dev"

      - name: Cleanup
        if: always()
        run: rm -f "${{ github.workspace }}/firebase-service-account.json"

  deploy-firestore-production:
    name: Deploy Firestore to production (sqyping-teamup)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate with Firebase Service Account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "❌ Erreur: Le secret FIREBASE_SERVICE_ACCOUNT n'est pas défini"
            exit 1
          fi
          SERVICE_ACCOUNT_FILE="${{ github.workspace }}/firebase-service-account.json"
          printf '%s\n' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$SERVICE_ACCOUNT_FILE"
          if ! python3 -m json.tool "$SERVICE_ACCOUNT_FILE" > /dev/null 2>&1; then
            echo "❌ Erreur: Le fichier JSON du service account est invalide"
            exit 1
          fi
          gcloud auth activate-service-account --key-file="$SERVICE_ACCOUNT_FILE"
          echo "SERVICE_ACCOUNT_FILE=$SERVICE_ACCOUNT_FILE" >> $GITHUB_ENV

      - name: Deploy Firestore Rules and Indexes (production)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.SERVICE_ACCOUNT_FILE }}
        run: |
          firebase deploy --only firestore:rules,firestore:indexes \
            --project sqyping-teamup \
            --non-interactive

      - name: Verify deployment
        run: echo "✅ Firestore déployé sur sqyping-teamup"

      - name: Cleanup
        if: always()
        run: rm -f "${{ github.workspace }}/firebase-service-account.json"
