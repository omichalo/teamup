name: Security Scan

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Exécuter une fois par semaine pour scanner tout l'historique
    - cron: '0 0 * * 0'

jobs:
  trufflehog-scan:
    name: Scan for secrets with TruffleHog
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupérer tout l'historique pour le scan complet

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Comment PR if secrets found
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Secrets détectés**\n\nTruffleHog a détecté des secrets potentiels dans ce PR. Veuillez les révoquer immédiatement et les remplacer par des variables d\'environnement ou des secrets GitHub.\n\nVoir [docs/SECURITY.md](./docs/SECURITY.md) pour plus d\'informations.'
            })

  gitleaks-scan:
    name: Scan for secrets with Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Scanner uniquement les fichiers modifiés pour les PRs
          # Scanner tout l'historique pour les pushes sur main
          no-git: false
          exit-code: 1
          severity-threshold: high

      - name: Comment PR if secrets found
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Secrets détectés**\n\nGitleaks a détecté des secrets potentiels dans ce PR. Veuillez les révoquer immédiatement et les remplacer par des variables d\'environnement ou des secrets GitHub.\n\nVoir [docs/SECURITY.md](./docs/SECURITY.md) pour plus d\'informations.'
            })

  dependency-scan:
    name: Scan dependencies for vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Comment PR if vulnerabilities found
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Vulnérabilités détectées dans les dépendances**\n\n`npm audit` a détecté des vulnérabilités modérées ou critiques. Veuillez exécuter `npm audit fix` ou mettre à jour les dépendances concernées.\n\nPour plus d\'informations, voir [GitHub Security Advisories](https://github.com/omichalo/teamup/security/dependabot).'
            })
